<!DOCTYPE html>
<html>

<head>
    <title>Socket.IO Multi User Test</title>
</head>

<body>

    <h2>Socket.IO Test Client</h2>

    <!-- INPUTS -->
    <input id="token" placeholder="Enter JWT Token" style="width:300px;" />
    <br><br>

    <input id="receiverId" placeholder="Enter Receiver ID" style="width:300px;" />
    <br><br>

    <input id="message" placeholder="Enter Message" style="width:300px;" />
    <br><br>

    <button onclick="connectSocket()">Connect</button>
    <button onclick="sendMessage()">Send Message</button>

    <p id="status"></p>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <script>

        let socket;



        /*
        ========================================
        CONNECT SOCKET
        ========================================
        */
        function connectSocket()
        {

            /*
            ========================================
            GET TOKEN
            ========================================
            */
            const token =
                document.getElementById(
                    "token"
                ).value;



            /*
            ========================================
            VALIDATE TOKEN
            ========================================
            */
            if (!token)
            {

                alert("Please enter token");

                return;

            }



            /*
            ========================================
            INITIALIZE SOCKET
            ========================================
            */
            socket = io(
                "http://localhost:5000",
                {

                    auth: {
                        token: token
                    },

                    transports: ["websocket"]

                }
            );



            /*
            ========================================
            CONNECTION SUCCESS
            ========================================
            */
            socket.on("connect", () =>
            {

                console.log(
                    "✅ Connected:",
                    socket.id
                );



                document.getElementById(
                    "status"
                ).innerText =
                    "Connected: " + socket.id;

            });




            /*
            ========================================
            CONNECTION ERROR
            ========================================
            */
            socket.on(
                "connect_error",
                (error) =>
                {

                    console.log(
                        "❌ Connection Error:",
                        error.message
                    );



                    alert(
                        "Connection Failed: "
                        + error.message
                    );

                }
            );



            /*
            ========================================
            RECEIVE MESSAGE
            ========================================
            */
            socket.on(
                "receive_message",
                (data) =>
                {

                    console.log(
                        "📩 Received:",
                        data
                    );



                    alert(
                        "Message Received: "
                        + data.message
                    );

                }
            );



            /*
            ========================================
            MESSAGE SENT
            ========================================
            */
            socket.on(
                "message_sent",
                (data) =>
                {

                    console.log(
                        "✅ Sent:",
                        data
                    );

                }
            );



            /*
            ========================================
            MESSAGE ERROR
            ========================================
            */
            socket.on(
                "message_error",
                (error) =>
                {

                    console.log(
                        "❌ Message Error:",
                        error
                    );



                    alert(
                        error.message
                    );

                }
            );



            /*
            ========================================
            ONLINE USERS
            ========================================
            */
            socket.on(
                "online_users",
                (users) =>
                {

                    console.log(
                        "🟢 Online Users:",
                        users
                    );

                }
            );



            /*
            ========================================
            DISCONNECT
            ========================================
            */
            socket.on(
                "disconnect",
                () =>
                {

                    console.log(
                        "❌ Disconnected"
                    );



                    document.getElementById(
                        "status"
                    ).innerText =
                        "Disconnected";

                }
            );

        }




        /*
        ========================================
        SEND MESSAGE
        ========================================
        */
        function sendMessage()
        {

            /*
            ========================================
            CHECK SOCKET
            ========================================
            */
            if (!socket)
            {

                alert(
                    "Connect socket first"
                );

                return;

            }



            /*
            ========================================
            GET INPUTS
            ========================================
            */
            const receiverId =
                document.getElementById(
                    "receiverId"
                ).value;



            const message =
                document.getElementById(
                    "message"
                ).value;



            /*
            ========================================
            VALIDATION
            ========================================
            */
            if (!receiverId || !message)
            {

                alert(
                    "Receiver ID and Message required"
                );

                return;

            }



            /*
            ========================================
            SEND MESSAGE EVENT
            ========================================
            */
            socket.emit(
                "send_message",
                {

                    receiverId,
                    message

                }
            );



            console.log(
                "📤 Message Sent Event Triggered"
            );

        }

    </script>

</body>

</html>
